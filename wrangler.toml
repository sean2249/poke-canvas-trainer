name = "poke-canvas-trainer"
compatibility_date = "2024-05-01"
pages_build_output_dir = "dist"

# 執行期所需的密鑰（不要寫在這裡）：
#   ANTHROPIC_API_KEY  — Anthropic API 金鑰（必填）
#   ANTHROPIC_MODEL    — 可選，預設 claude-sonnet-4-6
#
# 本機開發：建立 .dev.vars（見 .dev.vars.example），wrangler pages dev 會自動載入。
# 正式環境：在 Cloudflare Pages 專案 → Settings → Environment variables 設定，
#           或用：wrangler pages secret put ANTHROPIC_API_KEY
